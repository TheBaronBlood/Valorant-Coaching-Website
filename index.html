<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAL COACHING — OVE × BARONBLOOD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap');
:root{--bg:#0A0E13;--surface:#0F1923;--surface2:#1A2634;--border:#1E2D3D;--red:#FF4655;--red-dim:rgba(255,70,85,0.12);--yellow:#F5A623;--yellow-dim:rgba(245,166,35,0.12);--green:#50FA7B;--green-dim:rgba(80,250,123,0.10);--blue:#4A9EFF;--blue-dim:rgba(74,158,255,0.10);--text:#D8E0EA;--text-dim:#6B7A8D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;color:var(--red);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo-diamond{display:block;width:7px;height:7px;background:var(--red);transform:rotate(45deg)}
.header-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;font-family:'Share Tech Mono',monospace}
.header-spacer{flex:1}
.edit-toggle{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:'Share Tech Mono',monospace;padding:5px 12px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.edit-toggle:hover{border-color:var(--red);color:var(--red)}
.edit-toggle.active{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.coach-badge{background:var(--red-dim);border:1px solid rgba(255,70,85,0.3);color:var(--red);font-size:11px;font-family:'Share Tech Mono',monospace;padding:4px 10px;letter-spacing:1.5px}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
nav{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-group{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);padding:0 18px 6px;font-family:'Share Tech Mono',monospace}
nav ul{list-style:none;margin-bottom:20px}
nav ul li a{display:flex;align-items:center;gap:9px;padding:8px 18px;color:var(--text-dim);text-decoration:none;font-size:13px;cursor:pointer;transition:all .12s;border-left:2px solid transparent}
nav ul li a:hover,nav ul li a.active{color:var(--text);background:var(--red-dim);border-left-color:var(--red)}
.nav-icon{font-size:13px;width:15px;text-align:center}
main{flex:1;padding:36px 44px;overflow-y:auto;width:100%}
.content-wrap{max-width:1600px;width:100%}

/* SECTION HEADER */
.section-header{margin-bottom:28px}
.section-tag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--red);margin-bottom:6px}
.section-title{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;line-height:1}
.section-desc{margin-top:8px;font-size:13px;color:var(--text-dim);line-height:1.6;max-width:520px}

/* EDIT BANNER */
.edit-banner{background:var(--red-dim);border:1px solid rgba(255,70,85,0.3);padding:8px 14px;margin-bottom:20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:1px;display:flex;align-items:center;gap:8px}
.edit-banner::before{content:'✎';font-size:13px}

/* PROFICIENCY BADGES */
.prof-legend{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
.prof-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:3px 8px;cursor:pointer;user-select:none;transition:opacity .15s;white-space:nowrap}
.prof-badge:hover{opacity:.8}
.prof-none{background:rgba(107,122,141,0.1);border:1px solid rgba(107,122,141,0.3);color:var(--text-dim)}
.prof-red{background:var(--red-dim);border:1px solid rgba(255,70,85,0.4);color:var(--red)}
.prof-yellow{background:var(--yellow-dim);border:1px solid rgba(245,166,35,0.4);color:var(--yellow)}
.prof-green{background:var(--green-dim);border:1px solid rgba(80,250,123,0.4);color:var(--green)}

/* ERROR CARDS */
.error-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-bottom:16px}
.error-card{background:var(--surface);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
.error-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.error-card.crit::before{background:var(--red)}.error-card.high::before{background:var(--yellow)}.error-card.med::before{background:var(--blue)}
.error-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.error-level{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;margin-bottom:3px}
.error-card.crit .error-level{color:var(--red)}.error-card.high .error-level{color:var(--yellow)}.error-card.med .error-level{color:var(--blue)}
.error-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:#fff;letter-spacing:0.3px}
.error-desc{font-size:12px;color:var(--text-dim);line-height:1.5}

/* RULE BLOCKS */
.rule-block{background:var(--surface);border:1px solid var(--border);margin-bottom:10px}
.rule-blocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:10px}
.rule-block-header{padding:12px 16px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.block-chevron{margin-left:auto;color:var(--text-dim);font-size:11px;transition:transform .15s;flex-shrink:0}
.block-chevron.collapsed{transform:rotate(-90deg)}
.rule-block-body.hidden{display:none}
.rule-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(30,45,61,0.5);transition:background .1s}
.rule-item:last-child{border-bottom:none}.rule-item:hover{background:rgba(255,70,85,0.03)}
.rule-dot{width:5px;height:5px;border:1.5px solid var(--red);transform:rotate(45deg);margin-top:6px;flex-shrink:0}
.rule-item-content{flex:1}.rule-text{font-size:13px;line-height:1.5;color:var(--text)}.rule-text strong{color:#fff;font-weight:500}
.rule-sub{font-size:11.5px;color:var(--text-dim);margin-top:2px}
.rule-item-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* WARMUP */
.warmup-phase{background:var(--surface);border:1px solid var(--border);margin-bottom:14px}
.warmup-phase-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.warmup-icon{width:30px;height:30px;background:var(--red-dim);border:1px solid rgba(255,70,85,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.warmup-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.warmup-subtitle{font-size:11px;color:var(--text-dim)}
.warmup-time{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim)}
.warmup-task{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(30,45,61,0.4)}
.warmup-task:last-child{border-bottom:none}
.task-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--red);width:18px;flex-shrink:0;padding-top:2px}
.task-body{flex:1}.task-name{font-size:13px;font-weight:500;color:var(--text)}.task-note{font-size:11.5px;color:var(--text-dim);margin-top:2px}
.task-priority{margin-top:4px;font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--red);background:var(--red-dim);display:inline-block;padding:2px 7px;letter-spacing:1px}

/* SESSION CARDS */
.session-card{background:var(--surface);border:1px solid var(--border);margin-bottom:18px}
.session-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.session-num{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--red);line-height:1}
.session-label{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff}
.session-coach{font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--text-dim)}
.session-rating{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 9px;flex-shrink:0}
.session-rating.bad{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,70,85,0.3)}
.session-rating.ok{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(245,166,35,0.3)}
.session-rating.good{background:var(--green-dim);color:var(--green);border:1px solid rgba(80,250,123,0.3)}
.session-note{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(30,45,61,0.4);font-size:13px}
.session-note:last-child{border-bottom:none}
.note-type{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:2px 6px;flex-shrink:0;margin-top:1px;width:50px;text-align:center}
.note-type.neg{background:var(--red-dim);color:var(--red)}.note-type.pos{background:var(--green-dim);color:var(--green)}.note-type.tip{background:var(--blue-dim);color:var(--blue)}
.note-round{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:2px 5px;flex-shrink:0;margin-top:1px}
.note-text{flex:1;color:var(--text);line-height:1.5}

/* EDIT MODE BUTTONS */
.del-btn{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .12s}
.del-btn:hover{color:var(--red)}
.del-btn-sm{background:transparent;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;padding:2px 5px;line-height:1;transition:color .12s;flex-shrink:0}
.del-btn-sm:hover{color:var(--red)}
.add-item-row{padding:8px 16px;border-top:1px dashed rgba(30,45,61,0.8)}
.add-item-btn{background:transparent;border:1px dashed rgba(107,122,141,0.3);color:var(--text-dim);font-size:11px;font-family:'Share Tech Mono',monospace;padding:5px 12px;cursor:pointer;letter-spacing:1px;transition:all .12s;width:100%}
.add-item-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.add-card-btn{background:transparent;border:1px dashed rgba(107,122,141,0.3);color:var(--text-dim);font-size:11px;font-family:'Share Tech Mono',monospace;padding:9px 16px;cursor:pointer;letter-spacing:1px;transition:all .12s;width:100%;margin-top:10px;display:block}
.add-card-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border:1px solid var(--border);width:420px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 10px;font-family:'Inter',sans-serif;outline:none;transition:border-color .12s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--red)}
.form-group textarea{resize:vertical;min-height:70px}
.form-group select option{background:var(--surface)}
.form-check label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);text-transform:none;letter-spacing:0}
.form-check input[type=checkbox]{width:auto;accent-color:var(--red)}
.btn-primary{background:var(--red);border:none;color:#fff;font-size:12px;font-family:'Share Tech Mono',monospace;padding:8px 18px;cursor:pointer;letter-spacing:1.5px;transition:opacity .12s}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-family:'Share Tech Mono',monospace;padding:8px 18px;cursor:pointer;letter-spacing:1.5px;transition:all .12s}
.btn-secondary:hover{border-color:var(--text-dim);color:var(--text)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border)}

/* ===== DASHBOARD ===== */
.db-greeting{margin-bottom:32px}
.db-greeting-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--red);margin-bottom:6px}
.db-greeting-name{font-family:'Rajdhani',sans-serif;font-size:40px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;line-height:1}
.db-greeting-desc{font-size:13px;color:var(--text-dim);margin-top:8px}
.db-grid-top{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(8px,1.5vw,24px);margin-bottom:clamp(8px,1.5vw,16px)}
.db-stat{background:var(--surface);border:1px solid var(--border);padding:clamp(12px,1.5vw,22px) clamp(14px,1.8vw,26px);position:relative;overflow:hidden}
.db-stat-label{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,0.7vw,11px);letter-spacing:2px;color:var(--text-dim);margin-bottom:clamp(4px,0.5vw,8px);text-transform:uppercase}
.db-stat-val{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,3.5vw,52px);font-weight:700;line-height:1;color:#fff}
.db-stat-sub{font-size:clamp(10px,0.8vw,13px);color:var(--text-dim);margin-top:clamp(2px,0.3vw,6px)}
.db-grid-mid{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;margin-bottom:10px}
.db-grid-bot{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(min-width:1400px){.db-grid-mid{grid-template-columns:1.6fr 1fr}.db-grid-bot{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.db-grid-mid,.db-grid-bot{grid-template-columns:1fr}.db-grid-top{grid-template-columns:repeat(2,1fr)}}

/* STAT TILES */
.db-stat-accent{position:absolute;bottom:0;left:0;right:0;height:2px}
.db-stat.c-red .db-stat-accent{background:var(--red)}
.db-stat.c-yellow .db-stat-accent{background:var(--yellow)}
.db-stat.c-green .db-stat-accent{background:var(--green)}
.db-stat.c-blue .db-stat-accent{background:var(--blue)}
.db-stat-val.c-red{color:var(--red)}.db-stat-val.c-yellow{color:var(--yellow)}.db-stat-val.c-green{color:var(--green)}

/* SKILL OVERVIEW CARD */
.db-card{background:var(--surface);border:1px solid var(--border);padding:18px}
.db-card-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.db-card-title span{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;font-weight:400;margin-left:auto}

.skill-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.skill-bar-row:last-child{margin-bottom:0}
.skill-bar-label{font-size:12px;color:var(--text);width:90px;flex-shrink:0}
.skill-bar-track{flex:1;height:6px;background:var(--border);position:relative;overflow:hidden}
.skill-bar-fill{height:100%;transition:width .4s ease;position:relative}
.skill-bar-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.4)}
.skill-bar-pct{font-family:'Share Tech Mono',monospace;font-size:10px;width:28px;text-align:right;flex-shrink:0}

/* FOCUS LIST */
.focus-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(30,45,61,0.5)}
.focus-item:last-child{border-bottom:none}
.focus-dot{width:5px;height:5px;flex-shrink:0;margin-top:5px;transform:rotate(45deg)}
.focus-dot.r{background:var(--red);border:1px solid var(--red)}
.focus-dot.y{background:var(--yellow);border:1px solid var(--yellow)}
.focus-item-text{font-size:12.5px;color:var(--text);line-height:1.4;flex:1}
.focus-item-cat{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;flex-shrink:0;margin-top:2px}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px;font-size:12px}
.donut-leg-item{display:flex;align-items:center;gap:7px}
.donut-leg-dot{width:7px;height:7px;transform:rotate(45deg);flex-shrink:0}

/* RECENT SESSION */
.ses-mini-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(30,45,61,0.4);font-size:12px}
.ses-mini-row:last-child{border-bottom:none}
.ses-mini-badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 6px;flex-shrink:0}
.ses-mini-badge.neg{background:var(--red-dim);color:var(--red)}
.ses-mini-badge.pos{background:var(--green-dim);color:var(--green)}
.ses-mini-badge.tip{background:var(--blue-dim);color:var(--blue)}
.ses-mini-text{color:var(--text-dim);flex:1}

/* QUICK NAV TILES */
.qnav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px}
.qnav-tile{background:var(--surface);border:1px solid var(--border);padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.qnav-tile:hover{background:var(--red-dim);border-color:rgba(255,70,85,0.4)}
.qnav-tile-icon{font-size:18px;margin-bottom:4px}
.qnav-tile-label{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.qnav-tile:hover .qnav-tile-label{color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-diamond"></span>Val Coaching</div>
  <span class="header-sub">Ove × BaronBlood</span>
  <div class="header-spacer"></div>
  <button class="edit-toggle" id="edit-toggle" onclick="toggleEditMode()">
    <span id="edit-icon">🔒</span>
    <span id="edit-label">EDIT MODE</span>
  </button>
  <button class="edit-toggle" id="save-gh-btn" style="display:none" onclick="saveToGitHub()">
    <span>☁</span>
    <span>SPEICHERN</span>
  </button>
  <button class="edit-toggle" onclick="openGhSettings()" title="GitHub Verbindung einrichten" style="padding:5px 9px">
    <span>⚙</span>
  </button>
  <span id="sync-status" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--text-dim)">LOCAL</span>
  <span class="coach-badge">COACH: OVE</span>
</header>

<div class="layout">
  <nav id="sidebar"></nav>
  <main id="content"></main>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header" id="modal-title">Hinzufügen</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">ABBRECHEN</button>
      <button class="btn-primary" onclick="submitModal()">HINZUFÜGEN</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// DEFAULT DATA
// ================================================================
const DEFAULT_DATA = {
  fehler: [
    {id:'f1',level:'crit',name:'Kein Fokus aufs Game',desc:'AFK während Mates sterben, halbe Stunde nicht aufgepasst. Größtes Problem überhaupt.',proficiency:null},
    {id:'f2',level:'crit',name:'Overreveal',desc:'Zu weit aus der Deckung herauslehnen, von mehreren Angles getroffen werden.',proficiency:null},

const GH_CONFIG_KEY = 'val-gh-config-v1';

let coachingData = null;    // raw content from GitHub / DEFAULT_DATA
let myProgress = {};        // {itemId: 'red'|'yellow'|'green'|null}
let ghConfig = null;        // {owner, repo, branch, token, sha}
let ghSaving = false;

let _idCtr = Date.now();

function genId(p){ return p+'_'+(++_idCtr); }

// ---- Progress (badges) ----
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveProgress(){
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(myProgress));
}

// ---- GitHub config ----
function loadGhConfig(){
  try{ return JSON.parse(localStorage.getItem(GH_CONFIG_KEY)||'null'); }
  catch(e){ return null; }
}
function saveGhConfig(cfg){
  localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
  ghConfig = cfg;
}

// ---- Merge coaching data + progress into state ----
function mergeState(){
  // deep clone coachingData, then apply myProgress badges
  state = JSON.parse(JSON.stringify(coachingData));
  function applyBadge(item){
    item.proficiency = myProgress[item.id] ?? item.proficiency ?? null;
  }
  state.fehler.forEach(applyBadge);
  Object.values(state.skills).forEach(secs=>secs.forEach(sec=>sec.items.forEach(applyBadge)));
  buildIndex();
}

// ---- Strip proficiency before saving to GitHub ----
function stripProgress(data){
  const d = JSON.parse(JSON.stringify(data));
  d.fehler.forEach(i=>{ delete i.proficiency; });
  Object.values(d.skills).forEach(secs=>secs.forEach(sec=>sec.items.forEach(i=>{ delete i.proficiency; })));
  return d;
}

// ---- Sync coachingData from state (edit mode changes) ----
function syncCoachingFromState(){
  coachingData = stripProgress(state);
}

// ---- Load coaching data from GitHub ----
async function loadCoachingData(){
  ghConfig = loadGhConfig();
  if(ghConfig && ghConfig.owner && ghConfig.repo){
    try{
      const branch = ghConfig.branch||'main';
      const url = `https://raw.githubusercontent.com/${ghConfig.owner}/${ghConfig.repo}/${branch}/data.json?t=${Date.now()}`;
      const res = await fetch(url);
      if(res.ok){
        const data = await res.json();
        coachingData = data;
        updateSyncStatus('synced');
        return;
      }
    }catch(e){ console.warn('GitHub fetch failed, using default data', e); }
    updateSyncStatus('error');
  } else {
    updateSyncStatus('local');
  }
  coachingData = JSON.parse(JSON.stringify(DEFAULT_DATA));
}

// ---- Save to GitHub ----
async function saveToGitHub(){
  if(!ghConfig || !ghConfig.token || !ghConfig.owner || !ghConfig.repo){
    openGhSettings();
    return;
  }
  if(ghSaving) return;
  ghSaving = true;
  updateSyncStatus('saving');
  syncCoachingFromState();

  try{
    const branch = ghConfig.branch||'main';
    const apiUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/data.json`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(coachingData, null, 2))));

    // get current sha
    let sha = null;
    try{
      const r = await fetch(apiUrl+'?ref='+branch, {headers:{'Authorization':'token '+ghConfig.token,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){ const j=await r.json(); sha=j.sha; }
    }catch(e){}

    const body = {message:`coaching update ${new Date().toLocaleDateString('de-DE')}`,content,branch};
    if(sha) body.sha = sha;

    const res = await fetch(apiUrl, {
      method:'PUT',
      headers:{'Authorization':'token '+ghConfig.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body: JSON.stringify(body)
    });

    if(res.ok){
      updateSyncStatus('synced');
      showToast('✓ Gespeichert auf GitHub');
    } else {
      const err = await res.json();
      updateSyncStatus('error');
      showToast('❌ Fehler: '+(err.message||res.status));
    }
  }catch(e){
    updateSyncStatus('error');
    showToast('❌ Netzwerk-Fehler');
  }
  ghSaving = false;
}

// ---- saveState: routes to correct storage ----
function saveState(){
  // proficiency changes → only localStorage
  Object.values(itemIndex).forEach(en=>{
    if(en.item.proficiency !== undefined){
      if(en.item.proficiency !== null)
        myProgress[en.item.id] = en.item.proficiency;
      else
        delete myProgress[en.item.id];
    }
  });
  saveProgress();
  buildIndex();
}

function saveStateAndSync(){
  // coaching content changed (edit mode) → also flag for GitHub save
  saveState();
  syncCoachingFromState();
}

// ---- UI helpers ----
function updateSyncStatus(status){
  const el = document.getElementById('sync-status');
  if(!el) return;
  const map = {
    local:  {t:'LOCAL',c:'#6B7A8D'},
    synced: {t:'SYNCED ✓',c:'var(--green)'},
    saving: {t:'SPEICHERN...',c:'var(--yellow)'},
    error:  {t:'SYNC ERROR',c:'var(--red)'},
  };
  const s = map[status]||map.local;
  el.textContent = s.t;
  el.style.color = s.c;
}

function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:Share Tech Mono,monospace;font-size:11px;padding:10px 18px;z-index:999;letter-spacing:1px;transition:opacity .3s'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2500);
}

function buildIndex(){
  itemIndex = {};
  state.fehler.forEach(i => itemIndex[i.id] = {item:i,type:'fehler'});
  Object.entries(state.skills).forEach(([key,secs]) => {
    secs.forEach(sec => {
      itemIndex[sec.id] = {item:sec,type:'section',skillKey:key};
      sec.items.forEach(i => itemIndex[i.id] = {item:i,type:'skill-item',sectionId:sec.id,skillKey:key});
    });
  });
  state.warmup.forEach(ph => {
    itemIndex[ph.id] = {item:ph,type:'warmup-phase'};
    ph.items.forEach(i => itemIndex[i.id] = {item:i,type:'warmup-item',phaseId:ph.id});
  });
  state.sessions.forEach(ses => {
    itemIndex[ses.id] = {item:ses,type:'session'};
    ses.notes.forEach(n => itemIndex[n.id] = {item:n,type:'session-note',sessionId:ses.id});
  });
}

// — DASHBOARD —
function computeStats(){
  // collect all proficiency-bearing items
  const allItems = [];
  Object.entries(state.skills).forEach(([key,secs])=>{
    const labels={mechanics:'Mechanics',movement:'Movement',gamesense:'Game Sense',abilities:'Abilities'};
    secs.forEach(sec=>sec.items.forEach(it=>allItems.push({...it,cat:labels[key]||key,catKey:key})));
  });
  state.fehler.forEach(f=>allItems.push({...f,cat:'Fehler',catKey:'fehler',text:f.name}));

  const total=allItems.length;
  const counts={null:0,red:0,yellow:0,green:0};
  allItems.forEach(i=>{ counts[i.proficiency]=(counts[i.proficiency]||0)+1; });

  // per-skill breakdown
  const skillKeys=['mechanics','movement','gamesense','abilities'];
  const skillLabels={mechanics:'Mechanics',movement:'Movement',gamesense:'Game Sense',abilities:'Abilities'};
  const skillStats = skillKeys.map(key=>{
    const items=[];
    (state.skills[key]||[]).forEach(sec=>sec.items.forEach(i=>items.push(i)));
    const green=items.filter(i=>i.proficiency==='green').length;
    const total=items.length;
    return {key,label:skillLabels[key],green,total,pct:total?Math.round(green/total*100):0};
  });

  // focus items: red first, then yellow, max 7
  const focus = allItems
    .filter(i=>i.proficiency==='red'||i.proficiency==='yellow')
    .sort((a,b)=>{ if(a.proficiency===b.proficiency) return 0; return a.proficiency==='red'?-1:1; })
    .slice(0,7);

  // recent session
  const recent = state.sessions.length ? state.sessions[state.sessions.length-1] : null;

  return {allItems,total,counts,skillStats,focus,recent};
}

function donutSVG(counts,total){
  const vals=[
    {c:'#FF4655',v:counts.red||0},
    {c:'#F5A623',v:counts.yellow||0},
    {c:'#50FA7B',v:counts.green||0},
    {c:'#2A3D52',v:counts[null]||0},
  ];
  const r=38,cx=44,cy=44,stroke=10;
  const circ=2*Math.PI*r;
  let offset=0;
  const slices=vals.map(({c,v})=>{
    const pct=total?v/total:0;
    const dash=pct*circ;
    const gap=circ-dash;
    const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(-offset*circ/1).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
    return s;
  }).join('');
  const green=counts.green||0;
  const pct=total?Math.round(green/total*100):0;
  return `<svg class="donut-svg" width="88" height="88" viewBox="0 0 88 88">
    <circle cx="44" cy="44" r="${r}" fill="none" stroke="#1E2D3D" stroke-width="${stroke}"/>
    ${slices}
    <text x="44" y="40" text-anchor="middle" fill="#fff" font-family="Rajdhani,sans-serif" font-size="16" font-weight="700">${pct}%</text>
    <text x="44" y="53" text-anchor="middle" fill="#6B7A8D" font-family="Share Tech Mono,monospace" font-size="7">GUT</text>
  </svg>`;
}

function skillBarColor(pct){

  if(pct>=35) return 'var(--yellow)';
  return 'var(--red)';
}

function handleClick(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  // PROFICIENCY CYCLE
  if(action==='cycle-prof'){
    const en = itemIndex[id];
    if(en){ en.item.proficiency = cycleProficiency(en.item.proficiency); saveState(); renderContent(); }
    return;
  }

  // TOGGLE BLOCK
  if(action==='toggle-block'){
    const en = itemIndex[id];
    if(en){ en.item.collapsed = !en.item.collapsed; saveState(); renderContent(); }
    return;
  }

  // ---- ADD ----
  if(action==='add-fehler'){
    openModal('Neuer Fehler',`
      <div class="form-group"><label>Level</label>
        <select id="m-level">
          <option value="crit">🔴 Kritisch</option>
          <option value="high">🟡 Hoch</option>
          <option value="med">🔵 Mittel</option>
        </select></div>
      <div class="form-group"><label>Name</label><input id="m-name" placeholder="z.B. Overreveal" type="text"/></div>
      <div class="form-group"><label>Beschreibung</label><textarea id="m-desc" placeholder="Was passiert genau? Was ist zu tun?"></textarea></div>
      ${PROF_SELECT}`,()=>{
      const name=mval('m-name'); if(!name) return;
      state.fehler.push({id:genId('f'),level:mval('m-level')||'med',name,desc:mval('m-desc'),proficiency:mval('m-prof')||null});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-skill-item'){
    const secId = btn.dataset.sectionId;
    openModal('Neues Item hinzufügen',`
      <div class="form-group"><label>Text</label><input id="m-text" placeholder="z.B. Pre-aimen beim Peeken" type="text"/></div>
      <div class="form-group"><label>Erklärung (optional)</label><input id="m-sub" placeholder="Kurze Erläuterung..." type="text"/></div>
      ${PROF_SELECT}`,()=>{
      const text=mval('m-text'); if(!text) return;
      const en=itemIndex[secId]; if(!en) return;
      en.item.items.push({id:genId('si'),text,sub:mval('m-sub'),proficiency:mval('m-prof')||null});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-section'){
    const key=btn.dataset.skillKey;
    openModal('Neuer Block',`
      <div class="form-group"><label>Icon (Emoji)</label><input id="m-icon" placeholder="🎯" type="text" maxlength="4"/></div>
      <div class="form-group"><label>Titel</label><input id="m-title" placeholder="z.B. Advanced Mechanics" type="text"/></div>`,()=>{
      const title=mval('m-title'); if(!title) return;
      state.skills[key].push({id:genId('sec'),icon:mval('m-icon')||'📌',title,collapsed:false,items:[]});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-warmup-item'){
    const phId=btn.dataset.phaseId;
    openModal('Neue Übung',`
      <div class="form-group"><label>Name</label><input id="m-name" placeholder="z.B. Aimstars 2.0" type="text"/></div>
      <div class="form-group"><label>Hinweis (optional)</label><input id="m-note" placeholder="z.B. 2 Aufgaben absolvieren" type="text"/></div>
      <div class="form-group form-check"><label><input id="m-prio" type="checkbox"/> Als Priorität markieren (!!! Marker)</label></div>`,()=>{
      const name=mval('m-name'); if(!name) return;
      const en=itemIndex[phId]; if(!en) return;
      en.item.items.push({id:genId('wi'),name,note:mval('m-note'),priority:mchk('m-prio')});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-warmup-phase'){
    openModal('Neue Phase',`
      <div class="form-group"><label>Icon (Emoji)</label><input id="m-icon" placeholder="🎮" type="text" maxlength="4"/></div>
      <div class="form-group"><label>Phasenname</label><input id="m-name" placeholder="z.B. Phase 3 — Rangspiel" type="text"/></div>
      <div class="form-group"><label>Dauer (optional)</label><input id="m-time" placeholder="z.B. ~15 MIN" type="text"/></div>`,()=>{
      const name=mval('m-name'); if(!name) return;
      state.warmup.push({id:genId('wp'),icon:mval('m-icon')||'🎮',phase:name,time:mval('m-time'),items:[]});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-session-note'){
    const sesId=btn.dataset.sessionId;
    openModal('Neue Notiz',`
      <div class="form-group"><label>Typ</label>
        <select id="m-type">
          <option value="neg">❌ Fehler</option>
          <option value="pos">✅ Gut</option>
          <option value="tip">💡 Focus / Tipp</option>

      <div class="form-group"><label>Notiz</label><textarea id="m-text" placeholder="Was ist passiert?"></textarea></div>`,()=>{
      const text=mval('m-text'); if(!text) return;
      const en=itemIndex[sesId]; if(!en) return;
      en.item.notes.push({id:genId('sn'),type:mval('m-type')||'neg',round:mval('m-round')||null,text});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  if(action==='add-session'){
    const next=state.sessions.length+1;
    openModal('Neue Session',`
      <div class="form-group"><label>Session-Nummer</label><input id="m-num" value="${next}" type="number"/></div>
      <div class="form-group"><label>Label</label><input id="m-label" placeholder="Session ${next}" type="text"/></div>
      <div class="form-group"><label>Bewertung</label>
        <select id="m-rating">
          <option value="bad">❌ Viel zu verbessern</option>
          <option value="ok">🟡 Solide</option>
          <option value="good">✅ Stark gespielt</option>
        </select></div>
      <div class="form-group"><label>Bewertungs-Text</label><input id="m-rtext" placeholder="z.B. FOKUS PROBLEM" type="text"/></div>`,()=>{
      const num=parseInt(document.getElementById('m-num')?.value)||next;
      const rating=mval('m-rating')||'bad';
      const dfl={bad:'ZU VERBESSERN',ok:'SOLIDE',good:'STARK'};
      state.sessions.push({id:genId('ses'),num,label:mval('m-label')||`Session ${num}`,rating,ratingText:mval('m-rtext')||dfl[rating],notes:[]});
      saveStateAndSync(); renderContent(); closeModal();
    }); return;
  }

  // ---- DELETE ----
  if(action==='delete-fehler'){
    if(!confirm('Fehler löschen?')) return;
    state.fehler=state.fehler.filter(f=>f.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-skill-item'){
    if(!confirm('Item löschen?')) return;
    const en=itemIndex[id]; if(!en) return;
    const sec=itemIndex[en.sectionId]?.item; if(!sec) return;
    sec.items=sec.items.filter(i=>i.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-section'){
    if(!confirm('Ganzen Block mit allen Items löschen?')) return;
    const en=itemIndex[id]; if(!en) return;
    state.skills[en.skillKey]=state.skills[en.skillKey].filter(s=>s.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-warmup-item'){
    if(!confirm('Übung löschen?')) return;
    const en=itemIndex[id]; if(!en) return;
    const ph=itemIndex[en.phaseId]?.item; if(!ph) return;
    ph.items=ph.items.filter(i=>i.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-warmup-phase'){
    if(!confirm('Ganze Phase löschen?')) return;
    state.warmup=state.warmup.filter(p=>p.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-session-note'){
    if(!confirm('Notiz löschen?')) return;
    const en=itemIndex[id]; if(!en) return;
    const ses=itemIndex[en.sessionId]?.item; if(!ses) return;
    ses.notes=ses.notes.filter(n=>n.id!==id);
    saveStateAndSync(); renderContent(); return;
  }

  if(action==='delete-session'){
    if(!confirm('Ganze Session löschen?')) return;
    state.sessions=state.sessions.filter(s=>s.id!==id);
    saveStateAndSync(); renderContent(); return;
  }
}

// Enter key in modal
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !document.getElementById('modal-overlay').classList.contains('hidden')){
    const target=e.target;
    if(target.tagName!=='TEXTAREA') submitModal();
  }
  if(e.key==='Escape') closeModal();
});

async function init(){
  // show loading state
  document.getElementById('content').innerHTML = `<div style="padding:60px 44px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px">LADEN...</div>`;
  myProgress = loadProgress();
  await loadCoachingData();
  mergeState();
  renderNav();
  renderContent();
  document.getElementById('content').addEventListener('click', handleClick);
}

init();
</script>
